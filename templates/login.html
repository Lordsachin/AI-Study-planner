<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient">
    <div class="glass-container login-box">
        <h2 id="form-title">Welcome Back</h2>
        <p class="subtitle">AI-Powered Study Planner & Predictor</p>
        
        <form id="auth-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">Login</button>
            <p id="error-msg" class="error-msg"></p>
        </form>
        
        <p class="switch-text">
            <span id="switch-prompt">Don't have an account?</span> 
            <a href="#" id="switch-mode">Register here</a>.
        </p>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
